<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAU/USD Advanced AI Chart</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #131722; color: #d1d4dc; margin: 0; padding: 20px; }
        .header { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .controls { display: flex; gap: 10px; align-items: center; background: #1e222d; padding: 10px; border-radius: 6px; }
        button { background: #2a2e39; color: #d1d4dc; border: 1px solid #363c4e; padding: 8px 16px; border-radius: 4px; cursor: pointer; transition: 0.2s; font-weight: bold;}
        button:hover { background: #363c4e; }
        button.active { background: #2962ff; color: white; border-color: #2962ff; }
        input[type="text"] { background: #2a2e39; color: white; border: 1px solid #363c4e; padding: 8px; border-radius: 4px; width: 250px; }
        .toggle-container { display: flex; align-items: center; gap: 8px; margin-left: 10px; padding-left: 15px; border-left: 1px solid #363c4e;}
        #chart-container { width: 100%; height: 600px; border: 1px solid #363c4e; border-radius: 4px; position: relative; }
        .ai-panel { margin-top: 20px; padding: 15px; background: #1e222d; border-radius: 4px; border-left: 4px solid #2962ff; display: flex; justify-content: space-between;}
        #loading { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(30, 34, 45, 0.8); padding: 10px 20px; border-radius: 4px; z-index: 10; }
    </style>
</head>
<body>

    <div class="header">
        <div class="top-row">
            <h2 style="margin: 0;">XAU/USD (Gold) Live Chart</h2>
            <div>
                <input type="text" id="api-key" placeholder="Paste Free TwelveData API Key here">
            </div>
        </div>
        <div class="controls">
            <button class="tf-btn active" data-interval="5min">5m</button>
            <button class="tf-btn" data-interval="15min">15m</button>
            <button class="tf-btn" data-interval="1h">1H</button>
            <button class="tf-btn" data-interval="4h">4H</button>
            
            <div class="toggle-container">
                <input type="checkbox" id="sr-toggle">
                <label for="sr-toggle">Auto Support/Resistance</label>
            </div>
        </div>
    </div>

    <div id="chart-container">
        <div id="loading">Loading Real-Time Data...</div>
    </div>
    
    <div class="ai-panel">
        <div><strong>🤖 AI Analyst Status:</strong> <span id="ai-status">Awaiting Data...</span></div>
        <div id="last-update" style="font-size: 0.9em; color: #787b86;"></div>
    </div>

    <script>
        // --- 1. Chart Initialization ---
        const chartContainer = document.getElementById('chart-container');
        const chart = LightweightCharts.createChart(chartContainer, {
            layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc', },
            grid: { vertLines: { color: '#2a2e39' }, horzLines: { color: '#2a2e39' }, },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal, },
            timeScale: { timeVisible: true, secondsVisible: false, borderColor: '#363c4e'},
            rightPriceScale: { borderColor: '#363c4e' }
        });

        const candlestickSeries = chart.addCandlestickSeries({
            upColor: '#26a69a', downColor: '#ef5350', borderVisible: false,
            wickUpColor: '#26a69a', wickDownColor: '#ef5350',
        });

        let srLines = []; 
        let currentChartData = [];

        // --- 2. Live Data Fetching (TwelveData API) ---
        async function fetchRealData(interval) {
            const apiKey = document.getElementById('api-key').value.trim();
            if (!apiKey) {
                alert("Please enter a TwelveData API Key to load real-time charts.");
                return null;
            }

            document.getElementById('loading').style.display = 'block';
            
            // outputsize=200 fetches the last 200 candles
            const url = `https://api.twelvedata.com/time_series?symbol=XAU/USD&interval=${interval}&outputsize=200&apikey=${apiKey}`;
            
            try {
                const response = await fetch(url);
                const json = await response.json();
                
                if (json.status === 'error') {
                    alert("API Error: " + json.message);
                    return null;
                }

                // TwelveData returns newest to oldest. TradingView needs oldest to newest.
                const formattedData = json.values.map(d => ({
                    time: new Date(d.datetime).getTime() / 1000,
                    open: parseFloat(d.open),
                    high: parseFloat(d.high),
                    low: parseFloat(d.low),
                    close: parseFloat(d.close)
                })).reverse();

                document.getElementById('last-update').innerText = "Last Updated: " + new Date().toLocaleTimeString();
                return formattedData;

            } catch (error) {
                alert("Failed to fetch data. Check console for details.");
                console.error(error);
                return null;
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // --- 3. Auto Support & Resistance Logic ---
        function drawSupportResistance() {
            // Clear existing lines
            srLines.forEach(line => candlestickSeries.removePriceLine(line));
            srLines = [];

            if (!document.getElementById('sr-toggle').checked || currentChartData.length === 0) return;

            // Algorithm: Find local Highs and Lows over the last 100 candles
            const recentData = currentChartData.slice(-100);
            const prices = recentData.map(d => d.close);
            
            const resistance = Math.max(...prices);
            const support = Math.min(...prices);

            const resLine = candlestickSeries.createPriceLine({
                price: resistance, color: '#ef5350', lineWidth: 2, lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: true, title: 'RESISTANCE',
            });
            const supLine = candlestickSeries.createPriceLine({
                price: support, color: '#26a69a', lineWidth: 2, lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: true, title: 'SUPPORT',
            });
            
            srLines.push(resLine, supLine);
        }

        // --- 4. "AI" Signal Generation Logic ---
        function analyzeSignals() {
            if(currentChartData.length === 0) return;
            const markers = [];
            let latestSignal = "Market consolidating. Awaiting clear momentum shift.";

            // AI Logic: Detect Bullish/Bearish Engulfing patterns + trend confirmation
            for (let i = 2; i < currentChartData.length; i++) {
                const prev = currentChartData[i-1];
                const curr = currentChartData[i];
                
                // Bullish Engulfing
                if (prev.close < prev.open && curr.close > curr.open && curr.open <= prev.close && curr.close >= prev.open) {
                    markers.push({ time: curr.time, position: 'belowBar', color: '#26a69a', shape: 'arrowUp', text: 'BUY' });
                    latestSignal = `Strong Bullish Reversal detected at ${curr.close.toFixed(2)}. Upward momentum favorable.`;
                }
                // Bearish Engulfing
                else if (prev.close > prev.open && curr.close < curr.open && curr.open >= prev.close && curr.close <= prev.open) {
                    markers.push({ time: curr.time, position: 'aboveBar', color: '#ef5350', shape: 'arrowDown', text: 'SELL' });
                    latestSignal = `Bearish Rejection detected at ${curr.close.toFixed(2)}. Downward pressure increasing.`;
                }
            }
            
            candlestickSeries.setMarkers(markers);
            document.getElementById('ai-status').innerText = latestSignal;
        }

        // --- 5. App Controller ---
        async function loadChart(interval) {
            const data = await fetchRealData(interval);
            if (data) {
                currentChartData = data;
                candlestickSeries.setData(data);
                drawSupportResistance();
                analyzeSignals();
                chart.timeScale().fitContent();
            }
        }

        // --- 6. Event Listeners ---
        document.querySelectorAll('.tf-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                loadChart(e.target.dataset.interval);
            });
        });

        document.getElementById('sr-toggle').addEventListener('change', drawSupportResistance);

        // Auto-load if API key is pressed Enter
        document.getElementById('api-key').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const activeInterval = document.querySelector('.tf-btn.active').dataset.interval;
                loadChart(activeInterval);
            }
        });

        // Make chart responsive
        window.addEventListener('resize', () => {
            chart.applyOptions({ width: chartContainer.clientWidth });
        });
    </script>
</body>
</html>
